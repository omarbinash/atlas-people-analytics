name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

jobs:
  python-and-dbt-parse:
    runs-on: ubuntu-latest

    env:
      SNOWFLAKE_ACCOUNT: dummy-account
      SNOWFLAKE_USER: dummy-user
      SNOWFLAKE_PASSWORD: dummy-password
      SNOWFLAKE_ROLE: ATLAS_DEVELOPER
      SNOWFLAKE_WAREHOUSE: ATLAS_WH
      SNOWFLAKE_DATABASE: ATLAS
      SNOWFLAKE_SCHEMA: RAW
      SNOWFLAKE_DBT_SCHEMA: DBT_DEV
      DBT_TARGET: dev

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: make lint

      - name: Pytest
        run: pytest tests/

      - name: dbt deps
        run: dbt deps --project-dir dbt_project

      - name: dbt parse
        run: |
          cp dbt_project/profiles.yml.template dbt_project/profiles.yml
          dbt parse --project-dir dbt_project --profiles-dir dbt_project

      - name: Airflow DAG syntax
        run: python -m py_compile airflow/dags/atlas_people_analytics.py
